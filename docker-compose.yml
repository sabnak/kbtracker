services:
  app:
    container_name: kbtracker_app
    build:
      context: .
      dockerfile: ./docker-compose/app/Dockerfile
      args:
        MODE: dev
    env_file:
      - .env
    environment:
      DATABASE_DIR: /app/db
      TZ: Europe/Moscow
    volumes:
      - .:/app
      - kbtracker_db:/app/db
    ports:
      - "${APP_LOCAL_PORT}:80"
    networks:
      - kbtracker-network
    restart: unless-stopped

networks:
  kbtracker-network:
    driver: bridge

volumes:
  kbtracker_db:
